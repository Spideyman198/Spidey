# Extends the default gitleaks ruleset.
[extend]
useDefault = true

# Allowlisting rationale: the only "secrets" in this repo are non-secret test
# fixtures and documented placeholders. Test files carry descriptive fixture
# keys (e.g. "integration-test-secret-key-at-least-32-chars"); .env.example
# carries "change-me-..." placeholders. Real secrets only ever come from the
# environment at runtime and never enter the tree. The pre-commit gitleaks hook
# (diff-scoped) remains the guard against a real secret being introduced.
[allowlist]
description = "Test fixtures and documented placeholders — never real secrets"
paths = [
  '''backend/tests/.*''',
  '''\.env\.example''',
  '''scripts/export_openapi\.py''',
]
# Belt-and-suspenders: the descriptive placeholder shape these fixtures use.
regexes = [
  '''(?i)(test|integration|dev-only|placeholder|example|change-me|changeme|ci-test|openapi-export)[a-z0-9-]*(secret|key|master|password)''',
]
