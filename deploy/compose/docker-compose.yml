name: spidey

x-app-image: &app-build
  build:
    context: ../..
    dockerfile: infra/Dockerfile.backend
  image: spidey-backend:dev

x-app-env: &app-env
  SPIDEY_ENVIRONMENT: ${SPIDEY_ENVIRONMENT:-dev}
  SPIDEY_LOG_LEVEL: ${SPIDEY_LOG_LEVEL:-INFO}
  SPIDEY_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-spidey}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-spidey}
  SPIDEY_REDIS_URL: redis://redis:6379/0
  SPIDEY_QDRANT_URL: http://qdrant:6333
  # Empty when the obs profile is off; `make dev` injects the collector endpoint.
  SPIDEY_OTEL_EXPORTER_OTLP_ENDPOINT: ${SPIDEY_OTEL_COLLECTOR_ENDPOINT:-}
  SPIDEY_OTEL_SERVICE_NAME: spidey
  SPIDEY_CORS_ORIGINS: ${SPIDEY_CORS_ORIGINS:-http://localhost:5173}

x-app-hardening: &app-hardening
  restart: unless-stopped
  read_only: true
  tmpfs: [/tmp]
  security_opt: ["no-new-privileges:true"]
  cap_drop: [ALL]

services:
  api:
    <<: [*app-build, *app-hardening]
    # NB: keep all continuation lines at the SAME indent as the first — more-indented
    # lines in a folded scalar keep their newlines and silently truncate the command.
    command: >
      sh -c "alembic upgrade head &&
      exec uvicorn spidey.api.main:create_app --factory --host 0.0.0.0 --port 8000"
    environment: *app-env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      qdrant: { condition: service_started } # no shell in image → no healthcheck; API degrades gracefully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import sys, urllib.request
          sys.exit(0 if urllib.request.urlopen("http://127.0.0.1:8000/api/v1/health/live", timeout=3).status == 200 else 1)
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    cpus: 1.0
    mem_limit: 512m

  worker:
    <<: [*app-build, *app-hardening]
    command: >
      celery -A spidey.workers.celery_app.app worker
      --loglevel INFO --concurrency ${WORKER_CONCURRENCY:-2} -Q maintenance
    environment: *app-env
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "celery", "-A", "spidey.workers.celery_app.app", "inspect", "ping", "--timeout", "5"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
    cpus: 1.0
    mem_limit: 512m

  beat:
    <<: [*app-build, *app-hardening]
    command: >
      celery -A spidey.workers.celery_app.app beat
      --loglevel INFO --schedule /tmp/celerybeat-schedule
    environment: *app-env
    depends_on:
      redis: { condition: service_healthy }
    cpus: 0.25
    mem_limit: 256m

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spidey}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-spidey}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-spidey}"]
      interval: 5s
      timeout: 5s
      retries: 10
    security_opt: ["no-new-privileges:true"]
    mem_limit: 1g

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    security_opt: ["no-new-privileges:true"]
    mem_limit: 256m

  qdrant:
    image: qdrant/qdrant:v1.13.4
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    security_opt: ["no-new-privileges:true"]
    mem_limit: 1g

  # ── Observability (profile: obs) ────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    profiles: [obs]
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ../../infra/otel/collector-config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      jaeger: { condition: service_started }
    mem_limit: 256m

  jaeger:
    image: jaegertracing/all-in-one:1.65.0
    profiles: [obs]
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686" # UI
    mem_limit: 512m

  prometheus:
    image: prom/prometheus:v3.1.0
    profiles: [obs]
    restart: unless-stopped
    volumes:
      - ../../infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    mem_limit: 512m

  grafana:
    image: grafana/grafana:11.5.1
    profiles: [obs]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?set GF_SECURITY_ADMIN_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - ../../infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      prometheus: { condition: service_started }
    mem_limit: 512m

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
