{{- if .Values.externalSecrets.enabled }}
# Sync the app secret from a cloud secret manager via the External Secrets
# Operator — the preferred path. No secret material lives in this chart.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "spidey.secretName" . }}
  labels:
    {{- include "spidey.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name }}
    kind: {{ .Values.externalSecrets.secretStore.kind }}
  target:
    name: {{ include "spidey.secretName" . }}
    creationPolicy: Owner
  data:
    {{- range .Values.secrets.keys }}
    - secretKey: {{ . }}
      remoteRef:
        key: {{ $.Values.externalSecrets.remoteKey }}
        property: {{ . }}
    {{- end }}
{{- else }}
# Fallback: the chart expects a Secret of this name to already exist (created out
# of band from a SOPS-encrypted file or `kubectl create secret`). It is NEVER
# templated from plaintext values. This placeholder documents the required keys
# and is created empty only for the self-contained dev/kind path.
{{- if .Values.devDatabases.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "spidey.secretName" . }}
  labels:
    {{- include "spidey.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Dev-only placeholders (32+ chars to satisfy Settings validation). The kind
  # smoke path never signs real tokens; do NOT use these anywhere else.
  SPIDEY_AUTH_SECRET_KEY: "kind-smoke-only-auth-secret-key-000000"
  SPIDEY_ENCRYPTION_MASTER_KEY: "kind-smoke-only-encryption-master-000000"
  SPIDEY_ANTHROPIC_API_KEY: ""
{{- end }}
{{- end }}
