apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spidey.fullname" . }}-api
  labels:
    {{- include "spidey.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "spidey.selectorLabels" (dict "root" $ "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spidey.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "spidey.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "spidey.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - exec uvicorn spidey.api.main:create_app --factory --host 0.0.0.0 --port {{ .Values.api.port }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          envFrom:
            {{- include "spidey.envFrom" . | nindent 12 }}
          livenessProbe:
            httpGet: { path: /api/v1/health/live, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /api/v1/health/ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: workspaces
              mountPath: {{ .Values.workspaces.mountPath }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: workspaces
          persistentVolumeClaim:
            claimName: {{ .Values.workspaces.persistence.existingClaim | default (.Values.config.SPIDEY_SANDBOX_K8S_WORKSPACE_PVC | default "spidey-workspaces") }}
