apiVersion: v1
kind: Service
metadata:
  name: {{ include "spidey.fullname" . }}-api
  labels:
    {{- include "spidey.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "spidey.selectorLabels" (dict "root" $ "component" "api") | nindent 4 }}
