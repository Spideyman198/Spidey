{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "spidey.serviceAccountName" . }}
  labels:
    {{- include "spidey.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# App pods do not call the Kubernetes API; the worker gets a narrow, explicit
# RoleBinding (exec-rbac.yaml) to create sandbox Jobs — nothing more.
automountServiceAccountToken: false
{{- end }}
