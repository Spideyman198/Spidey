apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spidey.fullname" . }}-config
  labels:
    {{- include "spidey.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  SPIDEY_SANDBOX_K8S_SERVICE_ACCOUNT: {{ .Values.sandbox.execServiceAccount | quote }}
  SPIDEY_SANDBOX_IMAGE: {{ .Values.sandbox.image | quote }}
