apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spidey.fullname" . }}-beat
  labels:
    {{- include "spidey.labels" . | nindent 4 }}
    app.kubernetes.io/component: beat
spec:
  # Exactly one beat scheduler: Recreate avoids two schedulers overlapping during
  # a rollout (duplicate periodic tasks).
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "spidey.selectorLabels" (dict "root" $ "component" "beat") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spidey.labels" . | nindent 8 }}
        app.kubernetes.io/component: beat
    spec:
      serviceAccountName: {{ include "spidey.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: beat
          image: {{ include "spidey.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["celery", "-A", "spidey.workers.celery_app.app", "beat"]
          args: ["--loglevel", "INFO", "--schedule", "/tmp/celerybeat-schedule"]
          envFrom:
            {{- include "spidey.envFrom" . | nindent 12 }}
          resources:
            {{- toYaml .Values.beat.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
