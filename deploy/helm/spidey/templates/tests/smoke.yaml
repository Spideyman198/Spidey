apiVersion: v1
kind: Pod
metadata:
  name: {{ include "spidey.fullname" . }}-smoke-api
  labels:
    {{- include "spidey.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    {{- toYaml .Values.podSecurityContext | nindent 4 }}
  containers:
    - name: curl
      image: curlimages/curl:8.11.1
      command: ["sh", "-c"]
      args:
        - >
          curl -sf http://{{ include "spidey.fullname" . }}-api:{{ .Values.api.port }}/api/v1/health/ready
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
{{- if .Values.sandbox.enabled }}
---
# Proves the exec sandbox path end to end: a restricted Pod is admitted to the
# PSS-restricted exec namespace and runs to completion — the same admission the
# Kubernetes Jobs sandbox adapter relies on.
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "spidey.fullname" . }}-smoke-sandbox
  namespace: {{ .Values.sandbox.namespace }}
  labels:
    {{- include "spidey.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  serviceAccountName: {{ .Values.sandbox.execServiceAccount }}
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: {{ .Values.podSecurityContext.runAsUser }}
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: exec
      image: {{ .Values.sandbox.image }}
      command: ["sh", "-c", "echo sandbox-ok"]
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
{{- end }}
