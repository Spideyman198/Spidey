name: ✨ Feature request
description: Propose an enhancement
labels: ["type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today? Lead with the use case, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: architecture
    attributes:
      label: Architecture impact
      options:
        - label: This proposal would change a frozen v1.0 decision (requires a superseding ADR — see docs/14-design-review.md)
