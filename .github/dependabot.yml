version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    labels: ["type:deps"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]
    labels: ["type:deps"]

  - package-ecosystem: docker
    directory: /infra
    schedule:
      interval: weekly
      day: monday
    labels: ["type:deps"]

  # npm ecosystem is added at M12 when frontend/ exists — Dependabot fails a
  # configured ecosystem whose directory is missing.
