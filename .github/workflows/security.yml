name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * 1" # weekly full pass, Monday 04:17 UTC

permissions:
  contents: read

jobs:
  secrets:
    # Direct pinned CLI instead of gitleaks-action: the action scans only the
    # pushed commit range and computes it as `<first>^..<head>`, which is
    # unresolvable when the range contains the root commit (it broke this
    # repo's initial push). A full-history scan every run is also what this
    # job promises (docs/11 §3). Trade-off: scan time grows with history —
    # negligible at this repository's scale.
    name: Secret scan (full history)
    runs-on: ubuntu-24.04
    env:
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # the full history is the scan target
      - name: Install gitleaks (version + checksum pinned)
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
      - name: Scan entire git history
        run: ./gitleaks git --redact -v --exit-code 1 .

  sast:
    name: SAST (bandit + semgrep)
    runs-on: ubuntu-24.04
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { python-version: "3.12" }
      - run: uv sync --group dev
      - name: Bandit
        run: uv run bandit -r src -c pyproject.toml -ll
      - name: Semgrep (project invariant rules + community python)
        run: |
          uv run --with semgrep semgrep scan \
            --config ../infra/policy/semgrep \
            --config p/python \
            --error --metrics=off

  dependencies:
    name: Dependency audit
    runs-on: ubuntu-24.04
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { python-version: "3.12" }
      - name: pip-audit against the lockfile
        run: |
          uv export --frozen --no-emit-project --format requirements.txt -o requirements-audit.txt
          uv run --with pip-audit pip-audit -r requirements-audit.txt --strict

  licenses:
    name: Dependency license compliance (SEC-SUP)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { python-version: "3.12" }
      - name: Backend license gate (allow-list policy)
        working-directory: backend
        run: |
          uv sync --group dev
          uv run --with pip-licenses pip-licenses --format=json > licenses.json
          uv run python ../scripts/check_licenses.py licenses.json
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend license gate (fail on strong copyleft)
        working-directory: frontend
        run: |
          npm ci
          npx --yes license-checker --production --failOn 'GPL-2.0;GPL-3.0;AGPL-1.0;AGPL-3.0;SSPL-1.0'

  containers-and-config:
    name: Trivy (filesystem + IaC)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # Tag verified against the trivy-action releases (the repo moved to
      # v-prefixed tags; plain 0.x tags no longer exist for new versions).
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  policy:
    name: OPA/Conftest (infra policy)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Conftest on Dockerfiles and compose
        uses: docker://openpolicyagent/conftest:v0.56.0
        with:
          args: >-
            test --policy infra/policy/conftest
            infra/Dockerfile.backend deploy/compose/docker-compose.yml

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: spidey-sbom.cdx.json
