name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write # draft release + artifacts
  id-token: write # cosign keyless signing

jobs:
  release:
    name: Build, sign, draft release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
      - name: Build image to archive (no registry push — owner publishes)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.backend
          push: false
          tags: spidey-backend:${{ github.ref_name }}
          outputs: type=docker,dest=/tmp/spidey-backend-${{ github.ref_name }}.tar

      - name: SBOM for the release image
        uses: anchore/sbom-action@v0
        with:
          file: /tmp/spidey-backend-${{ github.ref_name }}.tar
          format: cyclonedx-json
          output-file: /tmp/spidey-backend-${{ github.ref_name }}.cdx.json
          upload-artifact: false

      - uses: sigstore/cosign-installer@v3
      - name: Sign artifacts (keyless, GitHub OIDC)
        run: |
          cosign sign-blob --yes \
            --output-signature /tmp/spidey-backend-${{ github.ref_name }}.tar.sig \
            --output-certificate /tmp/spidey-backend-${{ github.ref_name }}.tar.pem \
            /tmp/spidey-backend-${{ github.ref_name }}.tar
          cosign sign-blob --yes \
            --output-signature /tmp/spidey-backend-${{ github.ref_name }}.cdx.json.sig \
            --output-certificate /tmp/spidey-backend-${{ github.ref_name }}.cdx.json.pem \
            /tmp/spidey-backend-${{ github.ref_name }}.cdx.json

      - name: Draft GitHub release (manual publish by owner)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            /tmp/spidey-backend-${{ github.ref_name }}.tar
            /tmp/spidey-backend-${{ github.ref_name }}.tar.sig
            /tmp/spidey-backend-${{ github.ref_name }}.tar.pem
            /tmp/spidey-backend-${{ github.ref_name }}.cdx.json
            /tmp/spidey-backend-${{ github.ref_name }}.cdx.json.sig
            /tmp/spidey-backend-${{ github.ref_name }}.cdx.json.pem
