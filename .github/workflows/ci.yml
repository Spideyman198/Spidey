name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_LOCKED: "1" # never resolve in CI; the lockfile is the truth

jobs:
  lint:
    name: Lint & architecture boundaries
    runs-on: ubuntu-24.04
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with: { python-version: "3.12" }
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run lint-imports

  typecheck:
    name: Static types (pyright strict)
    runs-on: ubuntu-24.04
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with: { python-version: "3.12" }
      - run: uv sync --group dev
      - run: uv run pyright

  test:
    name: Tests & coverage
    runs-on: ubuntu-24.04
    defaults:
      run: { working-directory: backend }
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: spidey
          POSTGRES_PASSWORD: spidey-ci
          POSTGRES_DB: spidey_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U spidey" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 5s --health-retries 10
      qdrant:
        image: qdrant/qdrant:v1.13.4
        ports: ["6333:6333"]
    env:
      SPIDEY_ENVIRONMENT: test
      SPIDEY_DATABASE_URL: postgresql+asyncpg://spidey:spidey-ci@localhost:5432/spidey_test
      SPIDEY_REDIS_URL: redis://localhost:6379/0
      SPIDEY_QDRANT_URL: http://localhost:6333
      SPIDEY_AUTH_SECRET_KEY: ci-test-secret-key-at-least-thirty-two-characters
      SPIDEY_ENCRYPTION_MASTER_KEY: ci-test-encryption-master-key-thirty-two-chars
      # Bake embedding models into a cached dir so retrieval tests never re-download.
      SPIDEY_FASTEMBED_CACHE_PATH: ${{ github.workspace }}/.fastembed-cache
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with: { python-version: "3.12" }
      - run: uv sync --group dev
      # Local fastembed models (dense + BM25) are ~150 MB; cache across runs.
      - uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.fastembed-cache
          key: fastembed-bge-small-en-v1.5-bm25-v1
      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6333/readyz; then echo "qdrant ready"; exit 0; fi
            sleep 2
          done
          echo "qdrant did not become ready" >&2; exit 1
      - run: uv run pytest --cov=spidey --cov-report=xml --cov-report=term --cov-fail-under=85
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: backend/coverage.xml

  build:
    name: Docker image build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/Dockerfile.backend
          push: false
          tags: spidey-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
