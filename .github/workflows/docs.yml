name: Docs

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "**/*.md"
      - "docs/**"
      - "backend/src/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # Invoked directly (not via the wrapper action) so CI, pre-commit, and
      # `make docs` share ONE explicit version — the wrapper's bundled linter
      # drifted ahead of local (new MD060 rule) and broke main. Bump all three
      # pins together: here, .pre-commit-config.yaml, Makefile.
      - name: markdownlint-cli2 (pinned)
        run: npx --yes markdownlint-cli2@0.23.0 "**/*.md" "!node_modules" "!backend/.venv"

  links:
    name: Internal link check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          # Offline: validate repo-internal links only. External links rot on
          # their own schedule and must not break CI.
          args: --offline --include-fragments --no-progress "**/*.md"
          fail: true

  openapi-freshness:
    name: OpenAPI spec freshness
    runs-on: ubuntu-24.04
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { python-version: "3.12" }
      - run: uv sync --group dev
      - name: Exported spec must match the committed spec
        run: uv run python ../scripts/export_openapi.py --check ../docs/api/openapi.json
