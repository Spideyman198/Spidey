name: Docs

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "**/*.md"
      - "docs/**"
      - "backend/src/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !node_modules
            !backend/.venv

  links:
    name: Internal link check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          # Offline: validate repo-internal links only. External links rot on
          # their own schedule and must not break CI.
          args: --offline --include-fragments --no-progress "**/*.md"
          fail: true

  openapi-freshness:
    name: OpenAPI spec freshness
    runs-on: ubuntu-24.04
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { python-version: "3.12" }
      - run: uv sync --group dev
      - name: Exported spec must match the committed spec
        run: uv run python ../scripts/export_openapi.py --check ../docs/api/openapi.json
