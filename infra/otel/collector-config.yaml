# OpenTelemetry Collector: OTLP/HTTP in from api & workers, traces out to Jaeger.
# Metrics are scraped directly by Prometheus (app /metrics endpoints); no
# metrics pipeline here until a component exports OTLP metrics.
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 192
    spike_limit_mib: 48
  batch:
    timeout: 2s

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true # collector→jaeger stays on the isolated compose network

service:
  telemetry:
    metrics:
      # Collector self-metrics for the Prometheus scrape job. Defaults bind to
      # localhost (unreachable across containers); 0.0.0.0 here stays inside
      # the isolated compose network — the port is never published to the host.
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/jaeger]
