# OpenTelemetry Collector: OTLP/HTTP in from api & workers, traces out to Jaeger.
# Metrics are scraped directly by Prometheus (app /metrics endpoints); no
# metrics pipeline here until a component exports OTLP metrics.
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 192
    spike_limit_mib: 48
  batch:
    timeout: 2s

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true # collector→jaeger stays on the isolated compose network

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/jaeger]
