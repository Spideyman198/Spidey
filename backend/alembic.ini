[alembic]
script_location = alembic
prepend_sys_path = src
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
# The database URL is intentionally absent: alembic/env.py reads it from the
# validated application Settings so there is exactly one source of truth.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
